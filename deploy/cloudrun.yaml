apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: argus-backend
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Keep WebSocket connections on the same instance
        run.googleapis.com/sessionAffinity: "true"
        # Gen2 execution environment — better networking, lower cold starts
        run.googleapis.com/execution-environment: gen2
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      # Long timeout required for persistent Gemini Live API WebSocket sessions
      timeoutSeconds: 3600
      containerConcurrency: 80
      containers:
        - image: us-central1-docker.pkg.dev/PROJECT_ID/argus/argus-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: ARGUS_MODULES_DIR
              value: "/app/modules"
            # API key injected from Secret Manager at runtime — never stored in plain text
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GEMINI_API_KEY
                  key: latest
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            periodSeconds: 30
