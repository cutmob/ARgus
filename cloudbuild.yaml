# =============================================================================
# ARGUS — Cloud Build CI/CD Pipeline
# Triggered automatically on push to main, or run manually:
#   gcloud builds submit --config=cloudbuild.yaml .
#
# GCP services used:
#   - Cloud Build      (this file — IaC automation)
#   - Artifact Registry (stores Docker image)
#   - Cloud Run        (serves the backend)
#   - Secret Manager   (GEMINI_API_KEY injected at runtime, not build time)
# =============================================================================

substitutions:
  _REGION: us-central1
  _SERVICE: argus-backend
  _REPO: argus

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8   # faster builds

steps:
  # ── Step 1: Build the Docker image ─────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$SHORT_SHA
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:latest
      - --cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:latest
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - .

  # ── Step 2: Push to Artifact Registry ──────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE

  # ── Step 3: Deploy to Cloud Run ────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$SHORT_SHA
      - --region=$_REGION
      - --allow-unauthenticated
      - --session-affinity
      - --timeout=3600
      - --concurrency=80
      - --cpu=2
      - --memory=1Gi
      - --min-instances=0
      - --max-instances=10
      - --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest
      - --set-env-vars=PORT=8080,ARGUS_MODULES_DIR=/app/modules
      - --quiet

# Store the built images in Artifact Registry
images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:latest

# Build timeout (3 min is usually plenty for the Go binary)
timeout: 600s
